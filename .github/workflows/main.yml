name: Petclinic CICD Workflow

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:
  
  schedule:
    - cron: "0 2 * * *"   # nightly run at 2 AM UTC

permissions:
  contents: read


jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v7
      
      - name: setting jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: building application
        run: mvn install

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: petclinic-application
          path: target/*.jar

  security-scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: code checkout
        uses: actions/checkout@v7

      - name: setting jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: trivy security scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-path: './'
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          output: 'trivy-report.txt'

      - name: Upload trivy report
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report.txt
  
  docker-build:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: code checkout
        uses: actions/checkout@v7

      - name: docker image build
        run: "docker build -t petclinic-app:${{ github.run_number }} ."


   

      
          


      
      

   